        <div id="player" class="actor player" aria-label="猪头"><span class="npc-label">猪头</span><span class="shadow"></span></div>
        <div id="actionScene" class="action-scene" hidden></div>
      </div>
      <div id="photoFx" class="photo-fx" hidden><div class="camera-frame"><b id="photoCountdown">3</b><span>● REC</span><i></i></div><div class="photo-flash"></div><div class="memory-toast">照片已保存到回忆</div></div>
      <div id="speechLayer" class="speech-layer"></div>
      <div id="objective" class="objective"><span>任务</span><b id="objectiveText">找到 Hedy</b></div>
      <button id="interactBtn" class="interact-btn" hidden>互动</button>
      <div class="quickbar" aria-label="随身物品"><i class="active">📷</i><i>🎫</i><i>💧</i><i>♥</i></div>
    </section>

    <section id="narrator" class="narrator" hidden>
      <span class="feather">✦</span><p id="narratorText"></p><small>点击继续</small>
    </section>

    <nav class="mobile-controls" aria-label="移动控制">
      <div class="dpad">
        <button data-dir="up" aria-label="向上">▲</button>
        <button data-dir="left" aria-label="向左">◀</button>
        <i></i>
        <button data-dir="right" aria-label="向右">▶</button>
        <button data-dir="down" aria-label="向下">▼</button>
      </div>
      <button id="actionBtn" class="action-btn" aria-label="互动">A<small>互动</small></button>
    </nav>
  </main>

  <section id="titleScreen" class="title-screen">
    <div class="pixel-sky"><i></i><i></i><i></i></div>
    <div class="paper-note">
      <span>To. 猪猪宝贝：</span>
      <p>21年7月1日我们还是陌生人呢，想想那个时候幼稚的我和奔波的你，在两个毫不相干的时空中朝着对方的轨道不断奔跑，就觉得好神奇呢……</p>
      <small>From 老婆 ♡</small>
    </div>
    <h1>两条轨道</h1>
    <p>北京篇 · 可玩预览</p>
    <button id="startBtn" class="start-btn" disabled>正在准备回忆…</button>
  </section>

  <section id="mapOverlay" class="overlay" hidden>
    <div class="journal">
      <button class="close" data-close="mapOverlay">×</button>
      <small>BEIJING · MEMORY MAP</small>
      <h2>北京 · 第一次见面</h2>
      <div class="route-list">
        <button data-map="subway"><i>🚇</i><span><b>双井地铁站</b><small>赌约与第一次拥抱</small></span></button>
        <button data-map="park" id="parkMapButton" disabled><i>🌳</i><span><b>日坛公园</b><small>牵手、长椅与小土坡</small></span></button>
        <button data-map="bench"><i>🎥</i><span><b>日坛公园 · 长椅区</b><small>坐下录像 · 解锁拍立得</small></span></button>
        <button data-map="homestay"><i>🏠</i><span><b>北京民宿</b><small>做饭、电影、猪鼻子与拍立得</small></span></button>
        <button data-map="jingshan" id="jingMapButton" disabled><i>⛰️</i><span><b>景山公园</b><small>歪脖子树、万春亭与大风车</small></span></button>
      </div>
    </div>
  </section>

  <section id="completeOverlay" class="overlay" hidden>
    <div class="memory-card">
      <small>MEMORY UNLOCKED</small>
      <h2>日坛公园的下午</h2>
      <p>你们不再只是观看过去，而是重新走过了它。</p>
      <div class="locked-polaroid">拍立得将在北京篇全部完成后解锁</div>
      <button id="continueExplore" class="start-btn">继续在公园散步</button>
    </div>
  </section>

  <script src="./game.js"></script>
</body>
</html>
