<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#5f3d2a">
  <title>两条轨道 · 北京篇</title>
  <meta name="description" content="猪头与 Hedy 的北京像素回忆探索游戏">
  <meta property="og:title" content="两条轨道 · 北京篇">
  <meta property="og:description" content="重新走过双井地铁站与日坛公园的那个夏天。">
  <meta property="og:image" content="https://luckylc1998-sys.github.io/two-tracks-beijing/public/og.png">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="./game.css">
  <style>
    .actor::before{display:none!important}
    .npc-label{position:absolute;left:50%;top:-4px;transform:translate(-50%,-100%);padding:2px 5px;background:#fff5cc;border:2px solid #55351f;color:#3b271b;font-size:8px;white-space:nowrap;box-shadow:2px 2px #28170f}
    .prop.subway-bench{z-index:5}
    .tile.v1.grass{filter:brightness(1.04)}.tile.v2.grass{filter:saturate(.92)}.tile.v3.path{filter:brightness(.96)}
    .tile.grass.v1::after,.tile.grass.v3::after{content:"";position:absolute;width:2px;height:5px;background:#456f32;left:8px;top:17px;box-shadow:3px -2px #8ab85d,17px 7px #4d7935}
    .tile.path.v2::after{content:"";position:absolute;width:5px;height:3px;background:#a98c5b;left:21px;top:7px;box-shadow:-14px 16px #b89c65}
    .actor.nearby,.prop.nearby{filter:drop-shadow(0 0 5px #fff2a0) drop-shadow(0 0 7px #f0c955)!important}
    .actor.bump{animation:bump-wall .16s steps(2)}@keyframes bump-wall{50%{translate:0 -3px;filter:drop-shadow(0 0 4px #fff)}}
    .prop.ticket-machine{width:25px;height:38px;background:linear-gradient(#385e72 0 20%,#9fd5df 21% 42%,#35505d 43%);border:3px solid #243842;box-shadow:inset 0 -7px #263d47}.prop.ticket-machine.red{background:linear-gradient(#8e4a42 0 20%,#f1bb8d 21% 42%,#693934 43%)}
    .prop.trash{width:18px;height:24px;background:linear-gradient(90deg,#405e63,#789095,#405e63);border:2px solid #293e42;border-top-width:5px}
    .prop.floor-arrow::after{content:"➜";font-size:23px;color:#b8a36c;opacity:.6}.prop.ceiling-light{width:44px;height:4px;background:#fffbe5;box-shadow:0 0 7px #fff8c8;opacity:.85}
    .prop.pond{width:96px;height:55px;border-radius:47%;background:repeating-radial-gradient(ellipse at 40% 45%,#9bd0d2 0 4px,#65a9b6 5px 11px);border:5px solid #5b8045;box-shadow:0 0 0 3px #87aa58}.prop.pond::after{content:"";position:absolute;width:14px;height:8px;border-radius:50%;background:#6e9b49;left:17px;top:19px;box-shadow:42px 12px #6e9b49}
    .prop.picnic{width:29px;height:23px;background:repeating-linear-gradient(45deg,#f2d5aa 0 5px,#c96865 5px 10px);border:2px solid #8e5044;transform:rotate(-4deg)}
    .prop.fallen-leaves::after{content:"✦ ･";color:#c67b3b;font-size:18px}.prop.butterflies::after{content:"﹒✦";color:#f3df6c;font-size:16px;animation:flutter 1s steps(2) infinite}@keyframes flutter{50%{translate:3px -5px}}.prop.bird::after{content:"⌄";font:bold 20px Arial;color:#3e4e58}
    .prop.pavilion{width:57px;height:43px;background:linear-gradient(#9b3f32 0 18%,#e5be67 19% 28%,#83402f 29%);border:3px solid #572b25;clip-path:polygon(0 22%,15% 0,85% 0,100% 22%,89% 25%,87% 100%,13% 100%,11% 25%)}
    .prop.fence{width:68px;height:25px;background:repeating-linear-gradient(90deg,#805638 0 5px,transparent 5px 17px);border-top:5px solid #6e492f;border-bottom:4px solid #6e492f}
    .tile.water{background:repeating-radial-gradient(ellipse at 20% 50%,#9cd6d4 0 3px,#5ba7b3 4px 10px);box-shadow:inset 0 4px #b9e4d5}.tile.sky{background:linear-gradient(#bad7dd,#dfe7d8)}.tile.cliff{background:linear-gradient(135deg,#8c865f 0 45%,#69694e 46% 65%,#a09a6b 66%);box-shadow:inset 0 -7px #555a42}.tile.stonepath{background-color:#a9a28d;background-image:linear-gradient(90deg,#777568 2px,transparent 2px),linear-gradient(#777568 2px,transparent 2px);background-size:16px 16px;box-shadow:inset 0 3px #d0cbb5}
    .prop.landmark{font-weight:bold;color:#fff8d2;text-shadow:2px 2px #4a281d}.prop.gate{width:86px;height:58px;margin:-28px 0 0 -26px;background:linear-gradient(#8c2f28 0 16%,#e5b65c 17% 25%,transparent 26%),repeating-linear-gradient(90deg,#81382b 0 8px,transparent 8px 28px);border-top:7px solid #5b2a24}.prop.arch{width:66px;height:62px;margin:-30px 0 0 -17px;background:linear-gradient(#8e3029 0 16%,#d8ac53 17% 25%,transparent 26%),repeating-linear-gradient(90deg,#7b352b 0 8px,transparent 8px 29px);border-top:6px solid #55231f}.prop.altar{width:73px;height:52px;margin:-25px 0 0 -20px;background:linear-gradient(#b8a88a 0 22%,#d8c7a3 23% 63%,#8e7c62 64%);border:4px solid #6d5c49;box-shadow:inset 0 -10px #89785e}.prop.pagoda{width:86px;height:92px;margin:-60px 0 0 -28px;background:repeating-linear-gradient(#a03c2e 0 9px,#e6b657 9px 14px,#743126 14px 24px);clip-path:polygon(10% 0,90% 0,100% 8%,87% 12%,96% 27%,84% 31%,92% 47%,82% 51%,88% 100%,12% 100%,18% 51%,8% 47%,16% 31%,4% 27%,13% 12%,0 8%)}
    .prop.pond-large{width:160px;height:96px;margin:-16px 0 0 -8px}.prop.lotus::after{content:"✿";font-size:26px;color:#f5a8bb;text-shadow:12px 9px #f6d8e0}.prop.stair{width:32px;height:25px;background:repeating-linear-gradient(#c2baa2 0 5px,#7f7969 5px 7px);transform:perspective(35px) rotateX(35deg)}.prop.viewpoint{width:40px;height:18px;border:3px dashed #f6d479;border-radius:50%;background:#ffffff32}.prop.lantern{width:9px;height:44px;background:#723c2f;border:2px solid #3d2621}.prop.lantern::before{content:"";position:absolute;left:-7px;top:-13px;width:19px;height:19px;background:#e34837;border:3px solid #512a25;box-shadow:0 0 12px #f3b65d}.prop.telescope{width:30px;height:14px;background:#52636a;border:3px solid #2e3b40;transform:rotate(-15deg)}.prop.tree.pine{clip-path:polygon(50% 0,72% 28%,64% 28%,86% 57%,72% 57%,96% 87%,58% 87%,58% 100%,42% 100%,42% 87%,4% 87%,28% 57%,14% 57%,36% 28%,28% 28%);border-radius:0;background:linear-gradient(90deg,#315f40,#609053,#284f37);border:0}
    /* Expanded 2.5D world and instant CSS-avatar fallback. */
    .world{will-change:transform;contain:layout style paint}.tiles{position:absolute;inset:0}.tile{transform:translateZ(0)}
    .tile.grass,.tile.path,.tile.hill,.tile.stonepath{box-shadow:inset 0 3px #ffffff24,inset -3px -3px #00000016}
    .prop.landmark,.prop.tree,.prop.pavilion,.prop.pagoda,.prop.gate,.prop.arch,.prop.altar{filter:drop-shadow(4px 7px 0 #26351f66) drop-shadow(0 10px 7px #1f20194d)}
    .prop.landmark::after{content:"";position:absolute;left:7%;right:7%;bottom:-7px;height:8px;background:#392b2266;transform:skewX(-28deg);z-index:-2}
    .actor{background-image:none}.actor::after{content:"";position:absolute;left:23px;top:11px;width:25px;height:41px;background:linear-gradient(#23232b 0 20%,#efb68d 21% 42%,#e9e7df 43% 73%,#a68b62 74%);border:2px solid #34251f;box-shadow:inset -4px 0 #0002;clip-path:polygon(20% 0,80% 0,100% 16%,88% 45%,83% 100%,55% 100%,50% 70%,45% 100%,17% 100%,12% 45%,0 16%)}
    .actor.hedy::after{background:linear-gradient(#202229 0 28%,#efb68d 29% 45%,#292a32 46% 77%,#e7d7b1 78%)}
    .prop.ritual-hall,.prop.qiwang-hall,.prop.shouhuang-hall{width:84px;height:58px;margin:-27px 0 0 -25px;background:linear-gradient(#a5362b 0 15%,#e4b45c 16% 23%,#8f3b2c 24% 31%,#d5b37a 32% 100%);border:4px solid #603226;box-shadow:inset 0 -12px #9b6943}.prop.shouhuang-hall{width:112px;height:66px;margin-left:-40px}.prop.qiwang-hall{width:94px;height:64px}.prop.small-pagoda{width:56px;height:66px;margin:-40px 0 0 -12px;background:repeating-linear-gradient(#a03c2e 0 8px,#e6b657 8px 13px,#743126 13px 21px);clip-path:polygon(10% 0,90% 0,100% 10%,84% 15%,94% 38%,80% 43%,88% 100%,12% 100%,20% 43%,6% 38%,16% 15%,0 10%)}
    .prop.sun-altar{width:104px;height:78px;margin:-36px 0 0 -35px;border-radius:50%;background:radial-gradient(circle,#b86445 0 27%,#dca66e 28% 38%,#7d3b2c 39% 44%,transparent 45%),repeating-conic-gradient(#d3bd8b 0 10deg,#a89165 10deg 20deg);border:5px solid #6c392d}.prop.mural{width:58px;height:42px;background:linear-gradient(135deg,#e9bd5f,#c35c43 42%,#527c7a);border:5px solid #75452c}.prop.altar-wall{width:65px;height:22px;background:repeating-linear-gradient(90deg,#8e3d31 0 12px,#d8b36f 12px 15px);border:3px solid #653127}.prop.hill-marker{width:70px;height:45px;background:linear-gradient(155deg,#638c45,#93b861);clip-path:polygon(0 100%,28% 24%,50% 56%,71% 0,100% 100%)}.prop.memorial-tree{width:52px;height:72px;margin:-38px 0 0 -10px;background:radial-gradient(circle at 45% 20%,#527845 0 34%,transparent 35%),linear-gradient(85deg,transparent 42%,#6f482d 43% 57%,transparent 58%)}
    .sprites-ready .actor{background-image:url('./public/couple-sprites-lite.png')}.sprites-ready .actor::after{display:none}.actor{scale:.76;transform-origin:50% 100%}.actor.face-left{transform:scaleX(-1)}.action-scene.photo{background-position:71.429% 66.666%}
    .actor.walking,.actor.hedy.walking{animation:pixel-step .26s steps(2) infinite}@keyframes pixel-step{50%{translate:0 -3px}}
    .action-scene{background-color:transparent}:root:not(.sprites-ready) .action-scene{border-radius:45%;background:linear-gradient(90deg,#ece9df 0 46%,#242630 47%);border:3px solid #38261f}
    @media(max-width:759px){.world{transition:none}.prop.tree.big{transform:scale(1.08)}.objective{max-width:76vw;overflow:hidden}.objective b{overflow:hidden;text-overflow:ellipsis}}
    .prop.escalator{width:68px;height:38px;background:repeating-linear-gradient(145deg,#7d8588 0 7px,#c4cbca 7px 10px);border:5px solid #405056;transform:perspective(45px) rotateX(24deg)}.prop.turnstiles{width:66px;height:25px;background:repeating-linear-gradient(90deg,#3c5862 0 10px,#8fb4b8 10px 17px);border:3px solid #293d43}.prop.transfer-corridor{width:82px;height:52px;margin-top:-18px;background:linear-gradient(#55798a 0 18%,#d8d8c9 19% 100%);border:5px solid #3b4a50;color:#fff;font-size:9px}.day-panel{position:absolute;right:72px;top:7px;z-index:31;padding:4px 9px;background:#f3d48a;border:3px solid #6b3f28;box-shadow:inset 0 0 0 2px #fff0b6,3px 3px #2a180f;color:#4b2c1c;text-align:right;font-size:9px}.day-panel b{display:block;font-size:12px}.quickbar{position:absolute;z-index:32;left:50%;bottom:8px;transform:translateX(-50%);display:flex;background:#c18b4d;border:3px solid #5b361f;box-shadow:3px 3px #24140c}.quickbar i{width:30px;height:30px;display:grid;place-items:center;border-right:2px solid #7a4b2d;font-style:normal;font-size:16px}.quickbar i.active{background:#f3ce78;outline:3px solid #fff1ad;z-index:2}
  </style>
</head>
<body>
  <main id="game" class="game">
    <header class="topbar">
      <button id="mapBtn" class="wood-btn" aria-label="打开地图">地图</button>
      <div class="chapter-sign">
        <small id="chapterDate">2022 · 07 · 11</small>
        <strong id="chapterName">双井地铁站</strong>
      </div>
      <button id="soundBtn" class="wood-btn" aria-label="音乐开关">♫</button>
      <div class="day-panel"><span>夏 · 第一天</span><b>14:20</b></div>
    </header>

    <section id="viewport" class="viewport" aria-label="游戏地图">
      <div id="world" class="world">
        <div id="tiles" class="tiles"></div>
        <div id="props" class="props"></div>
        <div id="npcs" class="npcs"></div>
        <div id="player" class="actor player" aria-label="猪头"><span class="npc-label">猪头</span><span class="shadow"></span></div>
        <div id="actionScene" class="action-scene" hidden></div>
      </div>
      <div id="speechLayer" class="speech-layer"></div>
      <div id="objective" class="objective"><span>任务</span><b id="objectiveText">找到 Hedy</b></div>
      <button id="interactBtn" class="interact-btn" hidden>互动</button>
      <div class="quickbar" aria-label="随身物品"><i class="active">📷</i><i>🎫</i><i>💧</i><i>♥</i></div>
    </section>

    <section id="narrator" class="narrator" hidden>
      <span class="feather">✦</span><p id="narratorText"></p><small>点击继续</small>
    </section>

    <nav class="mobile-controls" aria-label="移动控制">
      <div class="dpad">
        <button data-dir="up" aria-label="向上">▲</button>
        <button data-dir="left" aria-label="向左">◀</button>
        <i></i>
        <button data-dir="right" aria-label="向右">▶</button>
        <button data-dir="down" aria-label="向下">▼</button>
      </div>
      <button id="actionBtn" class="action-btn" aria-label="互动">A<small>互动</small></button>
    </nav>
  </main>

  <section id="titleScreen" class="title-screen">
    <div class="pixel-sky"><i></i><i></i><i></i></div>
    <div class="paper-note">
      <span>To. 猪猪宝贝：</span>
      <p>21年7月1日我们还是陌生人呢，想想那个时候幼稚的我和奔波的你，在两个毫不相干的时空中朝着对方的轨道不断奔跑，就觉得好神奇呢……</p>
      <small>From 老婆 ♡</small>
    </div>
    <h1>两条轨道</h1>
    <p>北京篇 · 可玩预览</p>
    <button id="startBtn" class="start-btn" disabled>正在准备回忆…</button>
  </section>

  <section id="mapOverlay" class="overlay" hidden>
    <div class="journal">
      <button class="close" data-close="mapOverlay">×</button>
      <small>BEIJING · MEMORY MAP</small>
      <h2>北京 · 第一次见面</h2>
      <div class="route-list">
        <button data-map="subway"><i>🚇</i><span><b>双井地铁站</b><small>赌约与第一次拥抱</small></span></button>
        <button data-map="park" id="parkMapButton" disabled><i>🌳</i><span><b>日坛公园</b><small>牵手、长椅与小土坡</small></span></button>
        <button data-map="jingshan" id="jingMapButton" disabled><i>⛰️</i><span><b>景山公园</b><small>歪脖子树、万春亭与大风车</small></span></button>
      </div>
    </div>
  </section>

  <section id="completeOverlay" class="overlay" hidden>
    <div class="memory-card">
      <small>MEMORY UNLOCKED</small>
      <h2>日坛公园的下午</h2>
      <p>你们不再只是观看过去，而是重新走过了它。</p>
      <div class="locked-polaroid">拍立得将在北京篇全部完成后解锁</div>
      <button id="continueExplore" class="start-btn">继续在公园散步</button>
    </div>
  </section>

  <script src="./game.js"></script>
</body>
</html>
